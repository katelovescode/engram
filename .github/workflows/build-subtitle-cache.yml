name: Build Subtitle Cache

# Manually triggered. Harvesting subtitles for ~300 shows takes a long time and
# hits rate-limited third-party scrapers, so this must NOT run on every release.
on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of popular TV shows to include"
        default: "300"
      cache_tag:
        description: "Release tag to publish the cache to (rolling, overwritten on each run)"
        default: "subtitle-cache-latest"

permissions:
  contents: write

# See ci.yml for context on the Node 24 opt-in.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: build-subtitle-cache
  cancel-in-progress: false

jobs:
  build-cache:
    name: Build & publish subtitle-vector cache
    runs-on: ubuntu-latest
    timeout-minutes: 720
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --no-install-project

      # Persist harvested SRTs across runs so repeat builds only scrape shows
      # /episodes not already on disk (download_subtitles() reuses cached files).
      # The key is unique per run (cache entries are immutable once written);
      # restore-keys pulls in the most recent prior cache. SRTs are plain text
      # and stay on the runner only — they are never added to the release tarball.
      - name: Restore harvested-subtitle cache
        uses: actions/cache@v5
        with:
          path: ~/.engram/cache/data
          key: subtitle-srt-${{ github.run_id }}
          restore-keys: |
            subtitle-srt-

      - name: Build subtitle cache
        working-directory: backend
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OPENSUBTITLES_API_KEY: ${{ secrets.OPENSUBTITLES_API_KEY }}
          OPENSUBTITLES_USERNAME: ${{ secrets.OPENSUBTITLES_USERNAME }}
          OPENSUBTITLES_PASSWORD: ${{ secrets.OPENSUBTITLES_PASSWORD }}
          # Passed via env so the Actions runtime never interpolates the raw
          # workflow input into the shell command (expression-injection guard).
          CACHE_LIMIT: ${{ inputs.limit }}
        # Harvested SRTs are kept by default so the cache step above can persist
        # them; they are excluded from the published tarball regardless.
        run: uv run python scripts/build_subtitle_cache.py --limit "$CACHE_LIMIT"

      # softprops/action-gh-release@v3 with a fixed tag overwrites the
      # release's assets on subsequent runs (the `files:` list replaces the
      # asset list). Backend reads cache_format_version from the in-tarball
      # manifest and falls back to scraping if it does not match its
      # vectorizer_config.CACHE_FORMAT_VERSION — so old backends remain
      # safe even when this rolling release ships a new format.
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.cache_tag }}
          name: "Subtitle Cache (latest)"
          make_latest: true
          body: |
            Precomputed subtitle-matching cache (hashed TF-IDF vectors).
            Rolling release — overwritten by each successful run of the
            Build Subtitle Cache workflow.

            Cache format version is in `manifest.json` inside the tarball.
            Downloaded automatically by Engram on first run.
          files: |
            backend/engram-subtitle-cache.tar.gz
            backend/manifest.json
