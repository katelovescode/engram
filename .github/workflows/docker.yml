name: Docker

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build and push to GHCR (e.g. v0.8.1). Leave empty for a smoke-test-only branch build.'
        required: false
        default: ''
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker/**"
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/docker.yml"

# See ci.yml for context on the Node 24 opt-in.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  IMAGE: ghcr.io/${{ github.repository }}
  # True for tag pushes and for manual dispatches that supply an explicit tag.
  IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/') || inputs.tag != '' }}

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build and publish image
    runs-on: ubuntu-latest
    # Skip the redundant PR-time image build for a release-only PR. The real
    # release image is built when tag-release.yml dispatches this workflow on the
    # tag (workflow_dispatch / tag push), which is not a pull_request event and so
    # is unaffected. Normal PRs and tag builds still build as before.
    if: >-
      !(github.event_name == 'pull_request' && startsWith(github.event.pull_request.title, 'chore: release v'))
    steps:
      - uses: actions/checkout@v6
        with:
          # When dispatched with an explicit tag, check out that tag's code.
          ref: ${{ inputs.tag || github.sha }}

      - uses: docker/setup-buildx-action@v4

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag || github.ref }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag || github.ref }}
            type=raw,value=latest,enable=${{ env.IS_RELEASE }}

      # Build once and load locally so we can smoke test before publishing.
      - name: Build image (load for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: engram:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          # MAKEMKV_SKIP_INSTALL avoids the slow first-run MakeMKV compile; we
          # only need the web server to come up and answer /health.
          docker run -d --name engram-ci -e MAKEMKV_SKIP_INSTALL=1 -p 8000:8000 engram:ci
          ready=0
          for i in $(seq 1 30); do
            if curl -fsS --max-time 2 http://127.0.0.1:8000/health > /dev/null; then
              ready=1
              break
            fi
            sleep 2
          done
          docker logs engram-ci || true
          docker rm -f engram-ci > /dev/null 2>&1 || true
          if [ "$ready" != "1" ]; then
            echo "container never became healthy"
            exit 1
          fi
          echo "smoke test passed"

      - name: Verify MakeMKV version detection
        run: |
          VERSION=$(docker run --rm \
            --entrypoint /usr/local/bin/install-makemkv.sh \
            -e MAKEMKV_DETECT_ONLY=1 \
            engram:ci || true)
          if [ -z "$VERSION" ]; then
            echo "::error::MakeMKV version detection returned empty — check if download page format changed"
            exit 1
          fi
          echo "Detected MakeMKV version: $VERSION"

      - name: Log in to GHCR
        if: env.IS_RELEASE == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Re-runs from the buildx cache, so this is fast.
      - name: Push image
        if: env.IS_RELEASE == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
